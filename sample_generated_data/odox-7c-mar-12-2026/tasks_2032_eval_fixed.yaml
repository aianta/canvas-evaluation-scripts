    :mapping:
      Course: Speculative Design for Public Futures 318
      Page: Speculative Policy Prototyping Workshop
    :answer_key:
      :Text: |-
        This page describes the Speculative Policy Prototyping Workshop for Speculative Design for Public Futures 318
        The workshop goal is to practice design led approaches for imagining and testing policy interventions that respond to public challenges. Students will learn methods for rapid policy sketching, narrative prototyping, and low fidelity testing with community personas to surface unintended consequences and power dynamics.
        Format and schedule - Three live sessions plus an asynchronous sprint. Session 1 - Framing constraints and norm mapping; Session 2 - Prototyping techniques and peer testing; Session 3 - Public feedback simulation and final pitches. Asynchronous work includes research, prototype development, and a reflective journal entry between sessions.
        Core activities - Rapid policy sketching and policy artifact creation; Scenario mapping and impact ladders; Persona based role play and tabletop testing; Creation of tangible engagement assets such as visual briefs, mock public notices, and short performative scripts to surface public responses.
        Deliverables and assessment - Team submission of two artifacts: a concise speculative policy brief and a prototype engagement asset. Assessment split includes peer feedback for 20 percent, instructor evaluation for 50 percent, and the reflective journal for 30 percent. Rubrics focus on plausibility, ethical reflection, clarity of public benefit, and attention to equity.
        Ethical guidance - Prototypes must avoid causing harm and must surface who benefits and who may be disadvantaged. Each submission needs a mitigation plan for potential harms and a plan for consent and data minimization when testing with people.
        Sample LMS discussion excerpt - Instructor - Please document key assumptions behind your prototypes and test them with at least two distinct community perspectives. Student A - We are prototyping a skills linked basic support policy and want feedback on how to make trade offs legible. Student B - Consider a pilot metric set that centers lived experience and access rather than only economic outputs. Instructor - Strong idea, draft a short evaluation plan before the next session for peer review.
        Support and logistics - Virtual office hours Thursdays 3 to 4 PM and by appointment. Upload draft artifacts to the workshop folder by Friday midnight to allow time for peer review and instructor comments.
  - :id: efa94da4-313e-4641-a592-ad898828ac1b
    :instance_text: 'Task: In the course "Urban Agroecology and Food Systems 341"
      view the page titled "Urban Soil Health and Community Food Networks" by navigating
      to the Pages Index and selecting the page from the list. Return the contents
      of the page body.'
    :instance_username: jordan.rivera@cityagro.edu
    :instance_password: yR7!pQ2sXk9
    :mapping:
      Course: Urban Agroecology and Food Systems 341
      Page: Urban Soil Health and Community Food Networks
    :answer_key:
      :Text: Urban soil health is foundational to resilient city food systems and
        depends on rigorous, place based research and inclusive stewardship. Soil
        science approaches such as systematic soil testing, profile description, and
        biological assays guide practices for building organic matter, enhancing nutrient
        cycling, and managing contaminant risk—especially in older urban neighborhoods.
        Community engaged methods combine participatory mapping, garden sampling,
        and open data sharing to center local knowledge and promote equitable access
        to safe growing spaces. Restoration techniques like composting, cover cropping,
        phytoremediation, and reduced tillage support soil structure and microbial
        diversity while reducing reliance on external chemical inputs. Linking soil
        stewardship to community food networks strengthens local distribution, supports
        culturally relevant diets, and builds collective capacity for food sovereignty.
        Municipal policy, accessible training, and targeted remediation funding are
        essential to scale evidence based interventions and protect public health
        from untested or well meaning but potentially harmful practices
  - :id: 42238117-cff1-4ed0-8302-316a4997061f
    :instance_text: 'Task: In the course "Quantum Materials and Nanostructures 412"
      view the page titled "Topological Quantum Materials and Nanofabrication" by
      navigating to the Pages Index and selecting the page from the list. Return the
      contents of the page body.'
    :instance_username: maya.chen@nanolab.univ.edu
    :instance_password: 9vT#K2qPz4Lm
    :mapping:
      Course: Quantum Materials and Nanostructures 412
      Page: Topological Quantum Materials and Nanofabrication
    :answer_key:
      :Text: |-
        Topological quantum materials are defined by global properties of their electronic band structure that produce protected surface or edge modes that are robust against weak disorder and perturbations
        This page introduces topological insulators topological semimetals and topological superconductors with emphasis on the physical concepts of Berry curvature band inversion and bulk boundary correspondence
        We review experimental platforms and nanofabrication routes used to realize and probe these phases including molecular beam epitaxy electron beam lithography focused ion beam atomic layer deposition and dry etching for device patterning
        Characterization techniques covered include angle resolved photoemission spectroscopy scanning tunneling microscopy quantum transport measurements and transmission electron microscopy with attention to sample preparation and cryogenic measurement methods
        Lab and cleanroom best practices are described with guidance on contamination control glove use hazardous material handling and reproducibility in nanofabrication workflows
        Applications such as fault tolerant qubits topological spintronics and low dissipation electronics are discussed along with current challenges like disorder induced localization and interfacing topological materials with superconductors
        Students are expected to engage with recent literature bring design proposals for nanodevices and participate in hands on fabrication and measurement sessions
  - :id: 92750067-feb6-4722-8ee8-03ef385e29e6
    :instance_text: 'Task: In the course "Astrobiology Field Methods and Planetary
      Habitability 301" view the page titled "Astrobiology Field Techniques and Habitability
      Assessment" by navigating to the Pages Index and selecting the page from the
      list. Return the contents of the page body.'
    :instance_username: lina.ortega@astroterra.edu
    :instance_password: V9r8!mQ2pLz
    :mapping:
      Course: Astrobiology Field Methods and Planetary Habitability 301
      Page: Astrobiology Field Techniques and Habitability Assessment
    :answer_key:
      :Text: Astrobiology combines field based investigation with laboratory analysis
        to evaluate the potential for life in planetary environments. Field methods
        emphasize careful site selection, sterile sampling, in situ measurement, and
        comprehensive metadata collection. Instruments range from handheld spectrometers
        and microscopes to drilling rigs and environmental sensors required for geochemical
        profiling and biosignature detection. Strict contamination control and planetary
        protection protocols preserve sample integrity and prevent forward contamination.
        Results are validated through reproducible workflows, cross disciplined collaboration,
        and peer reviewed publication to separate robust evidence from speculation.
        Mastery of these techniques allows students to assess habitability using observational
        constraints, thermodynamic limits, and ecological analogs on Earth
  - :id: 7d274590-8d86-4b40-b92a-60e2faa7c563
    :instance_text: 'Task: In the course "Computational Neuroethology and Animal Behavior
      477" view the page titled "Neural Circuits in Natural Behavior" by navigating
      to the Pages Index and selecting the page from the list. Return the contents
      of the page body.'
    :instance_username: avery.langford@neuroethology.edu
    :instance_password: 9bV4rTqL2#Xz
    :mapping:
      Course: Computational Neuroethology and Animal Behavior 477
      Page: Neural Circuits in Natural Behavior
    :answer_key:
      :Text: Understanding how neural circuits generate natural behavior is a core
        concern of Computational Neuroethology and Animal Behavior 477. This page
        summarizes experimental and computational strategies for linking neurons and
        networks to ethologically relevant actions. Topics include in vivo electrophysiology,
        calcium imaging, targeted perturbations using optogenetics and chemogenetics,
        and anatomical mapping with modern connectomic approaches. We emphasize studying
        behavior in naturalistic contexts, extracting kinematic and pose features
        with automated tracking, and building dynamical models that predict decision
        making and motor sequences. Practical modules will cover preprocessing of
        neural and behavioral data, model fitting, cross validation, and interpretation
        of circuit level mechanisms. The page also addresses reproducibility, data
        sharing, and ethical considerations for research with live animals to promote
        rigorous and responsible science.
  - :id: dc5e65df-2e44-4cc6-85a5-6fa90bd92d6d
    :instance_text: 'Task: In the course "Museum Robotics and Artifact Conservation
      347" view the page titled "Robotic Systems for Artifact Preservation" by navigating
      to the Pages Index and selecting the page from the list. Return the contents
      of the page body.'
    :instance_username: r.prescott@heritagemuseum.edu
    :instance_password: G7vYk9rQ!2bM
    :mapping:
      Course: Museum Robotics and Artifact Conservation 347
      Page: Robotic Systems for Artifact Preservation
    :answer_key:
      :Text: Robotic systems for artifact preservation combine precision engineering
        with conservation science to support the long term care of museum collections.
        They encompass autonomous mobile platforms for continuous environmental monitoring,
        compliant robotic arms for delicate handling and localized treatments, and
        non contact imaging such as 3D scanning and multispectral photography for
        condition assessment. These tools improve repeatability of inspections, reduce
        physical risk to fragile objects, and enable interventions in confined or
        hazardous areas while preserving human oversight. Effective use depends on
        close collaboration between conservators, curators, and engineers to ensure
        mechanical actions respect material sensitivity and historical context. The
        course emphasizes validation, ethical practice, and documentation so that
        robotic interventions are reversible, minimally invasive, and fully recorded.
        Topics include sensor fusion, compliant control strategies, data management
        for long term monitoring, and case studies demonstrating successful robotic
        conservation projects
  - :id: 369328ce-9031-4097-8f7b-02fb72790d53
    :instance_text: 'Task: In the course "Cinematic Sound Design for Interactive Storytelling
      327" view the page titled "Spatial Audio Techniques for Interactive Storytelling"
      by navigating to the Pages Index and selecting the page from the list. Return
      the contents of the page body.'
    :instance_username: lucas.santoro@cinematicsound.edu
    :instance_password: N8vQ2rM6bXz
    :mapping:
      Course: Cinematic Sound Design for Interactive Storytelling 327
      Page: Spatial Audio Techniques for Interactive Storytelling
    :answer_key:
      :Text: Spatial audio is essential for crafting immersive moments in interactive
        storytelling. This page summarizes practical techniques for spatializing sound
        in games and narrative projects, focusing on perceptual clarity and adaptive
        workflows. Covered topics include ambisonics and binaural rendering, head
        related transfer function approaches and their approximations, realtime spatialization
        inside popular engines, and audio middleware integration with FMOD and Wwise.
        We outline strategies for mixing in dynamic scenes where listener position
        and camera control change over time, plus methods for simulating room acoustics
        and occlusion in interactive contexts. Performance considerations address
        cpu budgets, level of detail for distant sources, and batching to reduce overhead.
        Hands on exercises will guide you through creating spatial mixes, performing
        listening tests on headphones and multichannel setups, and iterating based
        on player feedback. Links to sample plugins, reference projects, and further
        readings are provided for continued study
  - :id: 0ed69546-cefd-499b-a137-7266673ba14e
    :instance_text: 'Task: In the course "Forensic Linguistics and Legal Discourse
      314" view the page titled "Forensic Linguistics Casework and Courtroom Discourse"
      by navigating to the Pages Index and selecting the page from the list. Return
      the contents of the page body.'
    :instance_username: noah.kendrick@forensiclangu.edu
    :instance_password: Rv9Pq2sXw8Zb
    :mapping:
      Course: Forensic Linguistics and Legal Discourse 314
      Page: Forensic Linguistics Casework and Courtroom Discourse
    :answer_key:
      :Text: |-
        Forensic linguistics applies linguistic theory and empirical methods to the analysis of language related evidence
           in legal and investigative contexts. Analysts examine patterns of lexis and grammar to address questions of
           authorship attribution, document authenticity, and the wording of confessions or threats. Methods range from
           corpus driven comparisons and computational stylometry to careful phonetic analysis of recorded speech,
           always paired with explicit statements about uncertainty and scope of inference. Courtroom discourse is
           treated as a distinct communicative environment shaped by procedural norms role relations and strategic
           interactional moves among judge counsel witness and jurors. Good practice emphasizes transparent methodology
           preservation of original materials clear reporting of limitations and a commitment to ethical handling of
           sensitive evidence to support fair and reliable decision making in legal settings
  - :id: ea6d8b78-1d72-466b-815f-cd348b6c9b9d
    :instance_text: 'Task: In the course "Climate Finance and Green Bond Markets 428"
      view the page titled "Climate Finance and Green Bond Fundamentals" by navigating
      to the Pages Index and selecting the page from the list. Return the contents
      of the page body.'
    :instance_username: aisha.patel@greenbondslab.edu
    :instance_password: GrnB428!q9V
    :mapping:
      Course: Climate Finance and Green Bond Markets 428
      Page: Climate Finance and Green Bond Fundamentals
    :answer_key:
      :Text: Climate finance mobilizes public and private capital to support low carbon
        and climate resilient development.  Green bonds are debt instruments that
        finance projects with clear environmental benefits and often include use of
        proceeds restrictions, independent verification, and ongoing reporting.  Key
        fundamentals include project eligibility, alignment with green taxonomies,
        third party certification, and robust impact metrics that enable transparency
        and investor confidence.  Market participants range from sovereign and municipal
        issuers to development banks and corporations each facing trade offs between
        cost of capital and credibility.  Investors evaluate credit risk, climate
        related transition and physical risks, and the integrity of labeling to avoid
        greenwashing.  Policy frameworks taxation incentives and standardised disclosure
        regimes play a central role in scaling issuance and improving market liquidity.  Case
        studies and empirical evidence help students assess pricing, additionality,
        and the real world outcomes of green bond financing.  This page provides an
        overview of concepts methodologies and practical tools for analysing green
        bond instruments within the broader climate finance landscape.
  - :id: 5b4e38df-1cf2-41da-8fda-57c6cc9fd6ad
    :instance_text: 'Task: In the course "Ethical Hacking and Civic Cybersecurity
      304" view the page titled "Responsible Disclosure and Bug Bounty Practices"
      by navigating to the Pages Index and selecting the page from the list. Return
      the contents of the page body.'
    :instance_username: taylor.monroe@coastaltech.edu
    :instance_password: Zr8!mQ2v9LpR
    :mapping:
      Course: Ethical Hacking and Civic Cybersecurity 304
      Page: Responsible Disclosure and Bug Bounty Practices
    :answer_key:
      :Text: |-
        This page defines responsible disclosure and bug bounty practices for Ethical Hacking and Civic Cybersecurity 304. It sets expectations for authorized testing, safe proof of concept development, concise reporting, legal considerations, and coordination with vendors and incident response teams. Adhering to these practices protects students, researchers, and community partners and reinforces ethical and civic minded security work.
        Guiding principles and rules
        - Obtain explicit authorization before testing any system or service
        - Limit testing to agreed scope and avoid collateral impact on third party users
        - Do not exfiltrate or retain sensitive data and avoid destructive techniques such as denial of service
        - Avoid social engineering and physical intrusion unless explicitly permitted
        Reporting expectations
        - Provide a short summary of the issue and its practical impact on users or services
        - Include clear reproduction steps and a minimal proof of concept
        - Describe root cause analysis and suggested remediation or mitigation steps
        - Estimate severity and potential mitigations based on risk to civic infrastructure
        Timelines and disclosure
        - Report issues privately to the responsible party and course staff when relevant
        - Allow a standard remediation window of 90 days before public disclosure unless urgent risk requires earlier action
        - Coordinate public disclosure to ensure fixes are available and to prevent harm
        Recognition and rewards
        - Researchers who follow these practices will be acknowledged in a manner agreed with the affected party
        - Bug bounties or course credit may be awarded based on impact and quality of the report
        Legal and safety notes
        - Ensure your work complies with applicable laws and the institution code of conduct
        - If in doubt seek prior approval from course instructors or legal advisors
        Contact and escalation
        - Use the official course reporting channel to submit findings and to request safe harbor or authorization
        - In emergencies contact the instructor and the campus security team for coordinated response
        Following these guidelines helps build trust between researchers and defenders and supports responsible, civic focused cybersecurity scholarship
