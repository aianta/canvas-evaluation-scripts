  - :id: cc767109-c786-4973-a98a-efd3851582ae
    :instance_text: 'Task: View the comments left by your instructor (Morgan Arceneau)
      on your "Participatory Workshop Plan" assignment in the "Speculative Design
      for Public Futures 318" course. What was the feedback Morgan Arceneau gave you?'
