  - :id: 3c72ad7b-e64f-4af0-9291-8b7968d5f705
    :instance_text: 'Task: View the comments left by your instructor (Elena Vargas)
      on your "Habitability Modeling and Simulation Project" assignment in the "Astrobiology
      Field Methods and Planetary Habitability 301" course. What was the feedback
      Elena Vargas gave you?'
    :instance_username: lina.ortega@astroterra.edu
    :instance_password: V9r8!mQ2pLz
    :mapping:
      Course: Astrobiology Field Methods and Planetary Habitability 301
      Teacher: Elena Vargas
      Assignment: Habitability Modeling and Simulation Project
    :answer_key:
      :Text: Strong technical implementation and clear documentation Well done on
        packaging the code for reproducibility For the final draft expand the discussion
        of how uncertainties in stellar spectra propagate through the model and consider
        adding one additional test that couples surface temperature to a simple ice
        albedo feedback loop This will strengthen conclusions about bistability and
        transient habitability
  - :id: 4630cb7d-d60d-4c87-bdd3-16d7a11a0502
    :instance_text: 'Task: View the comments left by your instructor (Dr Dina Rutherford)
      on your "Signal Detection and Animal Communication" assignment in the "Computational
      Neuroethology and Animal Behavior 477" course. What was the feedback Dr Dina
      Rutherford gave you?'
    :instance_username: avery.langford@neuroethology.edu
    :instance_password: 9bV4rTqL2#Xz
    :mapping:
      Course: Computational Neuroethology and Animal Behavior 477
      Teacher: Dr Dina Rutherford
      Assignment: Signal Detection and Animal Communication
    :answer_key:
      :Text: Solid integration of theory ecology and neural mechanisms include the
        detailed numbers for your example next time to strengthen the quantitative
        claim
  - :id: 3db63d41-6016-4018-9162-d4998acf550d
    :instance_text: 'Task: View the comments left by your instructor (Amelia Santos)
      on your "Microclimate Control with Autonomous Systems" assignment in the "Museum
      Robotics and Artifact Conservation 347" course. What was the feedback Amelia
      Santos gave you?'
    :instance_username: r.prescott@heritagemuseum.edu
    :instance_password: G7vYk9rQ!2bM
    :mapping:
      Course: Museum Robotics and Artifact Conservation 347
      Teacher: Amelia Santos
      Assignment: Microclimate Control with Autonomous Systems
    :answer_key:
      :Text: Strong technical approach with clear simulation evidence and practical
        mitigations. For revision add more detail on sensor placement methodology
        and include a brief cost estimate for key components. Also expand on how the
        system interfaces with building management systems for emergency scenarios.
  - :id: 184c648e-b56b-4b62-be20-de90539539fa
    :instance_text: 'Task: View the comments left by your instructor (Celia Moreno)
      on your "Synthesized SFX for Fantasy Interactions" assignment in the "Cinematic
      Sound Design for Interactive Storytelling 327" course. What was the feedback
      Celia Moreno gave you?'
